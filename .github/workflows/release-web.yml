name: Release Web
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate project canvas
        run: pnpm generate:canvas
      - name: Build web client
        run: pnpm build
        env:
          GITHUB_PAGES: 'true'
      - name: Copy canvas into dist
        run: |
          mkdir -p packages/client-next/dist/canvases
          cp .canvases/solidjs-analysis.canvas.json packages/client-next/dist/canvases/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client-next/dist
      - id: deployment
        uses: actions/deploy-pages@v4
