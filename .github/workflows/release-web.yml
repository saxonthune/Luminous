name: Release Web
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: extractions/setup-just@v2
      - run: pnpm install --frozen-lockfile
      - name: Generate project canvas
        run: just generate-canvas
      - name: Stage generated canvas for bundling
        # TODO: wire in solidjs-analysis pack once it exists alongside the graph
        run: |
          if [ -f .canvases/solidjs-analysis.canvas.json ]; then
            cp .canvases/solidjs-analysis.canvas.json packages/client-next/public/canvases/solidjs-analysis.graph.json
            node -e "
              const fs = require('fs');
              const p = 'packages/client-next/public/canvases/index.json';
              const m = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (!m.canvases.find(c => c.path === 'solidjs-analysis.graph.json')) {
                m.canvases.push({ path: 'solidjs-analysis.graph.json', name: 'Luminous – Solid.js Analysis', root: 'Luminous' });
                fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
              }
            "
          fi
      - name: Build web client
        run: just build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client-next/dist
      - id: deployment
        uses: actions/deploy-pages@v4
